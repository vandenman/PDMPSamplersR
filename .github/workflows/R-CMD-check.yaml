on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.julia && 'with Julia' || 'no Julia' }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  julia: true}
          - {os: ubuntu-latest,  julia: false}
          - {os: macOS-latest,   julia: true}
          - {os: windows-latest, julia: true}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Serialize Julia precompilation to reduce memory pressure on CI runners.
      # The precompile workload runs real sampling code, which can OOM-kill
      # parallel workers on resource-constrained runners.
      JULIA_NUM_PRECOMPILE_TASKS: "1"

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # local::. is needed for quarto vignettes on Windows
          # see https://github.com/quarto-dev/quarto-r/issues/217
          # JuliaCall dev version needed for libunwind fix (PR #265)
          # that prevents segfaults on Ubuntu 24.04; CRAN 0.17.6 predates this
          extra-packages: any::rcmdcheck, any::BH, any::RcppEigen, github::Non-Contradiction/JuliaCall, local::.
          needs: check

      - name: Set up Julia + R integration
        if: matrix.config.julia
        uses: ./.github/actions/setup-julia-r

      # Force RcppParallel to bypass TBB and use tinythread to avoid segfaults on macOS-latest
      - name: Configure R environment for macOS
        if: matrix.config.os == 'macOS-latest'
        run: echo 'RCPP_PARALLEL_BACKEND="tinythread"' >> ~/.Renviron

      - uses: r-lib/actions/check-r-package@v2
        if: matrix.config.os == 'macOS-latest'
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual", "--no-build-vignettes", "--compact-vignettes=gs+qpdf")'
          args: 'c("--no-manual", "--as-cran", "--ignore-vignettes")'

      - uses: r-lib/actions/check-r-package@v2
        if: matrix.config.os != 'macOS-latest'
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual", "--compact-vignettes=gs+qpdf")'
