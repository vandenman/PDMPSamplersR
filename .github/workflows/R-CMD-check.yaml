on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.julia && 'with Julia' || 'no Julia' }})

    strategy:
      fail-fast: true
      matrix:
        config:
          - {os: ubuntu-latest,  julia: true}
          - {os: ubuntu-latest,  julia: false}
          - {os: macOS-latest,   julia: true}
          - {os: windows-latest, julia: true}
          # TODO: in the future we should additionally test with
          # - {os: ubuntu-latest,  julia: true, r: release-1}
          # - {os: ubuntu-latest,  julia: true, r: release-2}
          # - {os: ubuntu-latest,  julia: true, r: release, brms: dev}
          # - {os: ubuntu-latest,  julia: true, PDMPSamplers.jl: dev}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      JULIA_NUM_PRECOMPILE_TASKS: "1"

    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Compute R cache keys
        if: matrix.config.os == 'macOS-latest'
        shell: Rscript {0}
        run: |
          cat("R_PACKAGE_LIBRARY=", normalizePath(.libPaths()[1], mustWork = FALSE), "\n",
              sep = "", file = Sys.getenv("GITHUB_ENV"), append = TRUE)
          cat("R_VERSION=", paste(R.version$major, R.version$minor, sep = "."), "\n",
              sep = "", file = Sys.getenv("GITHUB_ENV"), append = TRUE)

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # local::. is needed for quarto vignettes on Windows.
          # JuliaCall dev version is needed for the libunwind fix on Ubuntu 24.04.
          extra-packages: any::rcmdcheck, any::BH, any::RcppEigen, github::Non-Contradiction/JuliaCall, local::.
          needs: check

      - name: Set up Julia + R integration
        if: matrix.config.julia
        uses: ./.github/actions/setup-julia-r

      - name: Cache cmdstanr and CmdStan on macOS
        if: matrix.config.os == 'macOS-latest'
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.R_PACKAGE_LIBRARY }}/cmdstanr
            ~/.cmdstan
          key: ${{ runner.os }}-cmdstanr-${{ env.R_VERSION }}-${{ hashFiles('DESCRIPTION', '.github/workflows/R-CMD-check.yaml') }}
          restore-keys: |
            ${{ runner.os }}-cmdstanr-${{ env.R_VERSION }}-
            ${{ runner.os }}-cmdstanr-

      - name: Set up cmdstanr backend on macOS
        if: matrix.config.os == 'macOS-latest'
        shell: Rscript {0}
        run: |
          options(repos = c(
            stan = "https://mc-stan.org/r-packages/",
            CRAN = "https://cloud.r-project.org"
          ))

          if (!requireNamespace("cmdstanr", quietly = TRUE)) {
            install.packages("cmdstanr")
          }

          if (is.null(cmdstanr::cmdstan_version(error_on_NA = FALSE))) {
            cmdstanr::install_cmdstan(cores = 2, overwrite = FALSE, quiet = TRUE)
          }

          env_file <- Sys.getenv("GITHUB_ENV")
          cat("PDMPSAMPLERSR_BRMS_BACKEND=cmdstanr\n",
              file = env_file, append = TRUE)
          cat("CMDSTAN=", cmdstanr::cmdstan_path(), "\n",
              sep = "", file = env_file, append = TRUE)

      - uses: r-lib/actions/check-r-package@v2
        if: matrix.config.os == 'macOS-latest'
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual", "--no-build-vignettes", "--compact-vignettes=gs+qpdf")'
          args: 'c("--no-manual", "--as-cran", "--ignore-vignettes")'

      - uses: r-lib/actions/check-r-package@v2
        if: matrix.config.os != 'macOS-latest'
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual", "--compact-vignettes=gs+qpdf")'
