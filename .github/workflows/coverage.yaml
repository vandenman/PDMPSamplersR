on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: test-coverage

permissions: read-all

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      JULIA_NUM_PRECOMPILE_TASKS: "1"

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2, any::BH, any::RcppEigen, github::Non-Contradiction/JuliaCall, local::.
          needs: coverage

      - name: Install Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: '1'

      - name: Cache Julia packages
        uses: julia-actions/cache@v3

      - name: Cache PDMPSamplersR artifacts
        uses: actions/cache@v5
        with:
          path: ~/.cache/PDMPSamplersR
          key: ${{ runner.os }}-pdmpsamplersr-cache-${{ hashFiles('DESCRIPTION', '.github/workflows/coverage.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pdmpsamplersr-cache-

      - name: Configure RCall Julia preferences
        shell: Rscript {0}
        run: |
          rhome <- R.home()
          julia_ver_out <- system2("julia", "--version", stdout = TRUE)
          julia_ver_full <- strsplit(trimws(julia_ver_out), "\\s+")[[1]][3]
          parts <- strsplit(julia_ver_full, "\\.")[[1]]
          julia_ver <- paste(parts[1:2], collapse = ".")
          julia_depot <- Sys.getenv("JULIA_DEPOT_PATH", unset = "")
          if (nzchar(julia_depot)) {
            julia_depot <- strsplit(julia_depot, .Platform$path.sep)[[1]][1]
          } else {
            julia_depot <- file.path(path.expand("~"), ".julia")
          }
          env_dir <- file.path(julia_depot, "environments", paste0("v", julia_ver))
          dir.create(env_dir, recursive = TRUE, showWarnings = FALSE)
          libr <- file.path(rhome, "lib", "libR.so")
          rhome <- gsub("\\\\", "/", rhome)
          libr  <- gsub("\\\\", "/", libr)
          prefs_path <- file.path(env_dir, "LocalPreferences.toml")
          prefs <- sprintf('[RCall]\nRhome = "%s"\nlibR = "%s"\n', rhome, libr)
          writeLines(prefs, prefs_path)
          message("Wrote ", prefs_path, ":\n", prefs)

      - name: Install JuliaCall dependencies
        shell: bash
        run: julia -e 'using Pkg; Pkg.add("Suppressor"); Pkg.add("RCall")'

      - name: Pre-compile Julia project
        shell: bash
        run: |
          PROJECT_DIR=$(Rscript -e 'cat(path.expand(file.path(rappdirs::user_cache_dir("PDMPSamplersR"), "_juliaProject")))')
          echo "Julia project directory: $PROJECT_DIR"
          mkdir -p "$PROJECT_DIR"
          julia --project="$PROJECT_DIR" -e '
            import Pkg
            Pkg.add(url="https://github.com/vandenman/PDMPSamplers.jl")
            Pkg.add("BridgeStan")
            Pkg.precompile()
            using PDMPSamplers, LinearAlgebra, BridgeStan
            @info "Pre-compilation and loading successful"
          '

      - name: Set up Julia backend
        shell: Rscript {0}
        run: |
          library(PDMPSamplersR)
          pdmpsamplers_setup()

      - name: Test coverage
        shell: Rscript {0}
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov)

      - uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: ${{ github.event_name != 'pull_request' && true || false }}
          file: ./cobertura.xml
          plugin: noop
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
